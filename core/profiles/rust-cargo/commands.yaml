commands:
  install: "cargo fetch"
  format: "cargo fmt"
  format_check: "cargo fmt -- --check"
  lint: "cargo clippy --all-targets --all-features -- -D warnings"
  tests: "cargo test"
  docs: "cargo doc --no-deps"
  security: "cargo audit"
  coverage: "cargo llvm-cov --workspace --fail-under-lines {coverage_min}"
